openapi: 3.0.3
info:
  title: Rare Diseases API
  description: API for managing rare diseases
  version: 1.0.0
servers:
  - url: http://localhost/api
paths:
  /rare:
    get:
      summary: Get paginated list of rare diseases
      responses:
        '200':
          description: List of rare diseases
          content:
            application/json:
              schema:
                type: object
                properties:
                  current_page:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MaladieRare'
                  per_page:
                    type: integer
                  total:
                    type: integer

    post:
      summary: Create a new rare disease
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaladieRareInput'
      responses:
        '201':
          description: Rare disease created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaladieRare'

  /rare/{id}:
    get:
      summary: Get a rare disease by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Rare disease retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaladieRare'

    put:
      summary: Update a rare disease
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaladieRareInput'
      responses:
        '200':
          description: Rare disease updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaladieRare'

    delete:
      summary: Delete a rare disease
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Rare disease deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /rare/generate-description:
    post:
      summary: Generate a short medical description using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Name of the rare disease
                  example: "Fibrodysplasia Ossificans Progressiva"
      responses:
        '200':
          description: Generated description
          content:
            application/json:
              schema:
                type: object
                properties:
                  description:
                    type: string
        '500':
          description: AI error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string

components:
  schemas:
    MaladieRare:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        symptoms:
          type: string
        treatments:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MaladieRareInput:
      type: object
      required:
        - name
        - description
        - symptoms
      properties:
        name:
          type: string
        description:
          type: string
        symptoms:
          type: string
        treatments:
          type: string